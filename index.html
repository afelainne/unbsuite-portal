  <body>
    <div id="root"></div>
    <script>
      // Restore deep-link from 404.html SPA fallback (?spa_redirect=...)
      (function () {
        var url = new URL(window.location.href);
        var redirect = url.searchParams.get("spa_redirect");
        if (redirect) {
          url.searchParams.delete("spa_redirect");
          var clean = url.pathname + (url.search ? url.search : "") + url.hash;
          window.history.replaceState(null, "", redirect);
        }
      })();
    </script>
